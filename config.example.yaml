# Example configuration — copy to config.yaml and fill in your values.
# All settings can also be passed as CLI flags; CLI flags take precedence.

sale_url: "https://www.idealista.com/areas/venta-viviendas/con-pisos,apartamentos/?shape=..."
rent_url: "https://www.idealista.com/areas/alquiler-viviendas/?shape=..."

# Optional: coordinates of the reference property for haversine distance column
target_lat: 40.42
target_lon: -3.68

# Output workbook path
out: "./Idealista_Property_Analysis.xlsx"

# Maximum listings scraped per URL  (1–200)
max_per_type: 100

# Per-request random delay range in seconds
delay_min: 4
delay_max: 8

# Set to true only for first-run cookie priming
headful: false

# Playwright storage-state persistence file
session_file: "./.idealista_session.json"
